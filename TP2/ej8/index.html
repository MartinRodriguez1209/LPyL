<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <h1>INFORMACION</h1>
  <div class="cont_flex">
    <form action="">
      <fieldset>
        <div class="form-group">
          <label for="idNombre">Nombre</label>
          <input name="nombre" type="text" id="idNombre" />
        </div>
        <div class="form-group">
          <label for="idPrimerApellido">Primer apellido</label>
          <input type="text" name="primerApellido" id="idPrimerApellido" />
        </div>
        <div class="form-group">
          <label for="idSegundoApellido">Segundo apellido</label>
          <input type="text" name="segundoApellido" id="idSegundoApellido" />
        </div>
        <div class="form-group">
          <label for="idDomicilio">Domicilio</label>
          <input type="text" name="domicilio" id="idDomicilio" />
        </div>
        <div class="form-group">
          <label for="idCodigoPostal">Codigo Postal</label>
          <input type="number" name="codigoPostal" id="idCodigoPostal" />
        </div>
        <div class="form-group">
          <label for="idTelefono">Telefono</label>
          <input type="number" name="telefono" id="idTelefono" />
        </div>
        <div class="form-group">
          <label for="idEmail">Email</label>
          <input type="email" name="email" id="idEmail" />
        </div>
        <div class="form-group">
          <label for="idConfirmarEmail">Confirmar Email</label>
          <input type="email" name="confirmarEmail" id="idConfirmarEmail" />
        </div>
        <input type="button" value="Confirmar">
      </fieldset>
    </form>
  </div>
</body>

</html>
